<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Task Manager</h1>
            <p class="subtitle">Управляйте своими задачами</p>
        </header>

        <div class="task-input-section">
            <input type="text" id="taskInput" placeholder="Введите новую задачу..." maxlength="100">
            <button id="addTaskBtn" class="btn btn-primary">➕ Добавить</button>
        </div>

        <div class="stats">
            <span>Всего: <strong id="totalTasks">0</strong></span>
            <span>Выполнено: <strong id="completedTasks">0</strong></span>
            <span>Осталось: <strong id="remainingTasks">0</strong></span>
        </div>

        <div id="tasksList" class="tasks-list">
            <div class="empty-state">
                <span class="empty-icon">📭</span>
                <p>Нет задач</p>
                <p class="empty-sub">Добавьте свою первую задачу!</p>
            </div>
        </div>

        <footer>
            <p>⚡ Powered by FastAPI &copy; 2026</p>
        </footer>
    </div>

    <script src="./app.js"></script>
</body>
</html>
